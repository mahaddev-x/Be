name: data-extractor
version: "1.0"
description: "Extracts structured data from unstructured text"

model: groq/llama-3.1-8b-instant

temperature: 0.0
max_tokens: 512
timeout_seconds: 30
max_parallel: 500

system_prompt: |
  You are a precise data extraction engine. Given unstructured text and a target
  schema, extract all requested fields and return ONLY a valid JSON object.
  If a field cannot be found, use null. No explanation. No markdown.
  No text outside the JSON object.

user_prompt_template: |
  Extract data from this text according to the schema.

  Schema to extract: {{schema}}

  Text:
  {{text}}

  Return JSON only matching the requested schema fields.

input_vars:
  - name: text
    type: string
    required: true
  - name: schema
    type: string
    required: true

output_schema: {}

tools: []

retry:
  max_attempts: 3
  backoff_seconds: 2
