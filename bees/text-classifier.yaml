name: text-classifier
version: "1.0"
description: "Classifies text into one of N provided categories"

model: groq/gemma2-9b-it

temperature: 0.0
max_tokens: 256
timeout_seconds: 30
max_parallel: 500

system_prompt: |
  You are a precise text classifier. Given text and a list of categories,
  classify the text into exactly one category.
  Return ONLY a valid JSON object. No explanation. No markdown. No text outside the JSON.

user_prompt_template: |
  Classify the following text into one of these categories: {{categories}}

  Text: {{text}}

  Return JSON only with these fields:
  - category: string (must be one of the provided categories exactly)
  - confidence: number between 0.0 and 1.0
  - reasoning: string explaining why you chose this category

input_vars:
  - name: text
    type: string
    required: true
  - name: categories
    type: string
    required: true

output_schema:
  category: string
  confidence: number
  reasoning: string

tools: []

retry:
  max_attempts: 3
  backoff_seconds: 2
